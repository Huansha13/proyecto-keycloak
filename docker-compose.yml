services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: keycloak-subasta-${ENV_NAME}
    ports:
      - "${KC_PORT}:8080"
    environment:
      - KEYCLOAK_ADMIN=${KC_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD}
      - KC_HTTP_ENABLED=true
      - KC_HTTPS_REQUIRED=${KC_HTTPS_REQUIRED:false}
      - KC_HOSTNAME_STRICT=false
      - KC_LOG_LEVEL=${KC_LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./plugins:/opt/keycloak/providers
      - ./realm-export:/opt/keycloak/data/import
      - ./themes:/opt/keycloak/themes
      - keycloak-data:/opt/keycloak/data
    command: ${KC_COMMAND:-start-dev --import-realm --spi-theme-static-max-age=-1 --spi-theme-cache-themes=false --spi-theme-cache-templates=false}

volumes:
  keycloak-data: